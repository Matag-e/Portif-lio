<section id="projetos" class="section reveal">
    <div class="container">
        <h2 class="section-title">Meus Projetos</h2>
        
        <div class="projects-header">
            <div class="filter-container">
                <button *ngFor="let tech of tecnologias" 
                        class="filter-btn" 
                        [class.active]="filtroAtual === tech"
                        (click)="filtrarProjetos(tech)">
                    {{ tech }}
                </button>
            </div>
            
            <div class="view-toggle">
                <button class="view-btn" [class.active]="isGridView" (click)="isGridView = true" aria-label="Vista em Grade">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                </button>
                <button class="view-btn" [class.active]="!isGridView" (click)="isGridView = false" aria-label="Vista em Lista">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </button>
            </div>
        </div>

        <div class="projects-grid" [class.list-view]="!isGridView">
            <article class="project-card" *ngFor="let project of projetosFiltrados">
                <div class="project-image">
                    <div class="image-container">
                        <img [src]="project.imagem" [alt]="project.titulo" loading="lazy">
                        <div class="overlay">
                            <span>{{ project.titulo }}</span>
                        </div>
                    </div>
                </div>
                <div class="project-content">
                    <h3>{{ project.titulo }}</h3>
                    <div class="tech-tags">
                        <span *ngFor="let tech of project.tech" class="tech-tag">{{ tech }}</span>
                    </div>
                    <p>{{ project.descricao }}</p>
                    <div class="project-links">
                        <a [href]="project.link" target="_blank" class="btn-icon" aria-label="Ver Link">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        </a>
                        <a [href]="project.github" target="_blank" class="btn-icon" aria-label="Ver Código no GitHub">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                        </a>
                    </div>
                </div>
            </article>
        </div>
    </div>
</section>
